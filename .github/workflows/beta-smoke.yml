name: Beta Smoke Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '17 14 * * *'

permissions:
  contents: read

concurrency:
  group: beta-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install test dependencies
        run: npm install --no-audit --no-fund

      - name: Install browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Wait for GitHub Pages deployment
        run: |
          sleep 45
          for i in {1..18}; do
            if curl -fsS --retry 2 --retry-delay 2 https://ghost-protocol181.github.io/Eddies_basement/health.json | grep -q '"status":"ok"'; then
              exit 0
            fi
            sleep 10
          done
          echo "GitHub Pages did not become healthy in time"
          exit 1

      - name: Run cross-browser beta tests
        run: npm run test:beta

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beta-test-report-${{ github.run_attempt }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
