name: Beta Smoke Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '17 14 * * *'

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npx playwright install --with-deps chromium firefox webkit
      - name: Wait for GitHub Pages
        run: |
          for i in {1..12}; do
            if curl -fsS https://ghost-protocol181.github.io/Eddies_basement/health.json | grep -q '"status":"ok"'; then exit 0; fi
            sleep 10
          done
          exit 1
      - run: npm run test:beta
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beta-test-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
