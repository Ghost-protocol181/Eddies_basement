name: Site Check
on:
  push:
    branches: [main]
  schedule:
    - cron: '17 14 * * *'
  workflow_dispatch:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          test -f index.html
          test -f app.js
          test -f vault-data.js
          test -f health.json
          test -f manifest.webmanifest
          test -f favicon.svg
      - name: Check catalog is not empty
        run: grep -q "EDDIE_RAW" vault-data.js
      - name: Check production endpoints
        if: github.ref == 'refs/heads/main'
        run: |
          curl --fail --retry 3 --retry-delay 5 https://ghost-protocol181.github.io/Eddies_basement/ > /dev/null
          curl --fail --retry 3 --retry-delay 5 https://ghost-protocol181.github.io/Eddies_basement/health.json | grep '"status":"ok"'
          curl --fail --retry 3 --retry-delay 5 https://ghost-protocol181.github.io/Eddies_basement/vault-data.js | grep 'EDDIE_RAW'
