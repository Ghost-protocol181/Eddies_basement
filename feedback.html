<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Beta Feedback | Eddie's Basement</title>
<meta name="description" content="Send beta feedback for Eddie's Basement.">
<meta name="theme-color" content="#05070d">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<style>
:root{color-scheme:dark;--bg:#05070d;--panel:#111827;--line:rgba(255,255,255,.14);--text:#f8fafc;--muted:#aab4c7;--orange:#ff7b1a;--yellow:#ffd15f;--cyan:#38ddff}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 90% 0,rgba(255,123,26,.2),transparent 30%),var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}.wrap{width:min(760px,calc(100% - 28px));margin:auto;padding:42px 0}.back{display:inline-block;margin-bottom:24px;color:var(--cyan);font-weight:800}.card{border:1px solid var(--line);border-radius:24px;background:rgba(17,24,39,.9);padding:24px;box-shadow:0 28px 80px rgba(0,0,0,.4)}h1{margin:0 0 8px;font-size:clamp(34px,7vw,60px);letter-spacing:-.05em}p{color:var(--muted);line-height:1.6}.grid{display:grid;gap:15px;margin-top:24px}label{display:grid;gap:7px;font-weight:800}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:13px;background:#080c14;color:#fff;padding:13px;font:inherit}textarea{min-height:150px;resize:vertical}.actions{display:flex;gap:10px;flex-wrap:wrap}button{border:0;border-radius:999px;padding:14px 20px;background:linear-gradient(135deg,var(--orange),var(--yellow));color:#170900;font-weight:900;cursor:pointer}.secondary{border:1px solid var(--line);background:#111827;color:#fff}.note{font-size:13px}.success{display:none;margin-top:18px;padding:14px;border:1px solid rgba(56,221,255,.4);border-radius:12px;background:rgba(56,221,255,.08)}
</style>
</head>
<body><main class="wrap"><a class="back" href="./">← Back to the Basement</a><section class="card"><h1>Tell us what broke.</h1><p>Found a bad image, wrong game detail, dead link or confusing screen? Send the quickest useful note you can.</p><form id="feedbackForm" class="grid"><label>What happened?<select name="type" required><option value="">Choose one</option><option>Broken image</option><option>Game information is wrong</option><option>Link does not work</option><option>Something is confusing</option><option>Randomizer problem</option><option>Other</option></select></label><label>Game name, if relevant<input name="game" autocomplete="off"></label><label>What device are you using?<input name="device" placeholder="Example: iPhone 15, Chrome on Windows"></label><label>Tell us what happened<textarea name="details" required></textarea></label><div class="actions"><button type="submit">Save Feedback</button><button class="secondary" id="copyLatest" type="button">Copy Latest Report</button><button class="secondary" id="downloadReports" type="button">Download Reports</button></div></form><div id="success" class="success"></div><p class="note">Feedback is stored on this device. Copy or download the report, then send it through the Contact page or a GitHub issue.</p></section></main><script>
const f=document.getElementById('feedbackForm'),s=document.getElementById('success');
const read=()=>{try{return JSON.parse(localStorage.getItem('eb-beta-feedback')||'[]')}catch{return[]}};
const write=v=>{try{localStorage.setItem('eb-beta-feedback',JSON.stringify(v.slice(-100)))}catch{}};
const format=r=>[`Eddie's Basement beta report`,`Type: ${r.type||''}`,`Game: ${r.game||'N/A'}`,`Device: ${r.device||'Not provided'}`,`Page: ${r.page||''}`,`Time: ${r.createdAt||''}`,`Details: ${r.details||''}`].join('\n');
f.addEventListener('submit',e=>{e.preventDefault();const report={...Object.fromEntries(new FormData(f).entries()),page:document.referrer||location.href,createdAt:new Date().toISOString(),userAgent:navigator.userAgent};const items=read();items.push(report);write(items);f.reset();s.textContent='Feedback saved. Use Copy Latest Report or Download Reports to send it.';s.style.display='block';});
document.getElementById('copyLatest').addEventListener('click',async()=>{const latest=read().at(-1);if(!latest){s.textContent='Save a report first.';s.style.display='block';return}try{await navigator.clipboard.writeText(format(latest));s.textContent='Latest report copied.'}catch{s.textContent='Could not copy automatically. Use Download Reports instead.'}s.style.display='block';});
document.getElementById('downloadReports').addEventListener('click',()=>{const items=read();if(!items.length){s.textContent='Save a report first.';s.style.display='block';return}const blob=new Blob([JSON.stringify(items,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='eddies-basement-beta-feedback.json';a.click();URL.revokeObjectURL(a.href);s.textContent='Reports downloaded.';s.style.display='block';});
</script></body></html>
