<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" role="img" aria-labelledby="title desc">
  <title id="title">Eddie's Basement image coming soon placeholder</title>
  <desc id="desc">A neon retro game cover placeholder for missing game images.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#090915"/><stop offset=".42" stop-color="#10113c"/><stop offset="1" stop-color="#05070d"/></linearGradient>
    <linearGradient id="eb" x1="0" x2="1"><stop offset="0" stop-color="#35d9ff"/><stop offset=".46" stop-color="#1185ff"/><stop offset=".48" stop-color="#9dff00"/><stop offset="1" stop-color="#66d900"/></linearGradient>
    <linearGradient id="orange" x1="0" x2="1"><stop offset="0" stop-color="#ff6200"/><stop offset="1" stop-color="#ffd45f"/></linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="scan" width="6" height="6" patternUnits="userSpaceOnUse"><path d="M0 0h6" stroke="rgba(255,255,255,.13)" stroke-width="1"/></pattern>
  </defs>
  <rect width="600" height="800" rx="30" fill="url(#bg)"/>
  <rect x="13" y="13" width="574" height="774" rx="24" fill="none" stroke="#ff7a00" stroke-width="7" filter="url(#glow)"/>
  <rect x="33" y="33" width="534" height="734" rx="18" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="2"/>
  <path d="M0 0h120v800H0z" fill="rgba(0,0,0,.48)"/>
  <text transform="translate(72 610) rotate(-90)" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="55" fill="#f3f3f3" opacity=".84" letter-spacing="2">EDDIE'S BASEMENT</text>
  <text x="300" y="250" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="160" font-style="italic" letter-spacing="-10" fill="url(#eb)" stroke="#05070d" stroke-width="9" filter="url(#glow)">EB</text>
  <path d="M145 300h405v210H145z" rx="24" fill="#07101f" stroke="#823cff" stroke-width="7" filter="url(#glow)"/>
  <rect x="145" y="300" width="405" height="210" fill="url(#scan)" opacity=".45"/>
  <text x="347" y="382" text-anchor="middle" font-family="Courier New, monospace" font-weight="900" font-size="47" fill="#9dff00" filter="url(#glow)">IMAGE</text>
  <text x="347" y="435" text-anchor="middle" font-family="Courier New, monospace" font-weight="900" font-size="47" fill="#9dff00" filter="url(#glow)">COMING</text>
  <text x="347" y="488" text-anchor="middle" font-family="Courier New, monospace" font-weight="900" font-size="47" fill="#9dff00" filter="url(#glow)">SOON</text>
  <path d="M445 78l91-30-28 86 63 50-92 6-33 79-35-78-91-5 62-50-28-87z" fill="url(#orange)" filter="url(#glow)"/>
  <text x="455" y="129" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="28" fill="#111" transform="rotate(-8 455 129)">GAME ART</text>
  <text x="455" y="163" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="28" fill="#111" transform="rotate(-8 455 163)">LOADING</text>
  <g transform="translate(172 604)">
    <text x="150" y="0" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="54" fill="#ff7a00" stroke="#05070d" stroke-width="4">EDDIE'S</text>
    <text x="150" y="52" text-anchor="middle" font-family="Impact, Arial Black, sans-serif" font-size="46" fill="#f2f2f2" stroke="#05070d" stroke-width="4">BASEMENT</text>
    <path d="M34 70h232" stroke="#823cff" stroke-width="8" stroke-linecap="round"/>
  </g>
  <g transform="translate(34 661)">
    <path d="M8 35h58M37 7v58" stroke="#9d49ff" stroke-width="13" stroke-linecap="round"/>
    <text x="31" y="102" text-anchor="middle" font-family="Arial Black" font-size="19" fill="#9dff00">1 PLAYER</text>
  </g>
  <g transform="translate(420 646)">
    <rect width="120" height="92" rx="18" fill="rgba(0,0,0,.55)" stroke="#ff7a00" stroke-width="4"/>
    <text x="60" y="33" text-anchor="middle" font-family="Arial Black" font-size="24" fill="#fff">100%</text>
    <text x="60" y="60" text-anchor="middle" font-family="Arial Black" font-size="26" fill="#9dff00">RETRO</text>
    <circle cx="60" cy="78" r="8" fill="#ff7a00"/>
  </g>
</svg>