    <path d="M92 77h720c27 0 49 19 53 46l6 39c4 31-19 59-50 59H82c-27 0-49-23-46-50l5-43c3-29 25-51 51-51Z" fill="#0e1b31" stroke="#38ddff" stroke-opacity=".45" stroke-width="3"/>

