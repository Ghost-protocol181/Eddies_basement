    <text x="214" y="194" fill="url(#green)" stroke="#02101f" stroke-width="7" paint-order="stroke" font-family="Arial Black, Impact, Arial, Helvetica, sans-serif" font-size="82" font-weight="900" letter-spacing="-3">BASEMENT</text>

