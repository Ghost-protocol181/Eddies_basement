<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Eddie's Basement game card graphic</title>
  <desc id="desc">A polished arcade-style fallback graphic for games without official artwork.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07101f"/>
      <stop offset=".48" stop-color="#10233f"/>
      <stop offset="1" stop-color="#06101d"/>
    </linearGradient>
    <radialGradient id="glowA" cx="18%" cy="18%" r="55%">
      <stop offset="0" stop-color="#38ddff" stop-opacity=".32"/>
      <stop offset="1" stop-color="#38ddff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="82%" cy="18%" r="58%">
      <stop offset="0" stop-color="#ff8a24" stop-opacity=".34"/>
      <stop offset="1" stop-color="#ff8a24" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0v56" fill="none" stroke="#ffffff" stroke-opacity=".055" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#000" flood-opacity=".45"/>
    </filter>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <rect width="960" height="540" fill="url(#glowA)"/>
  <rect width="960" height="540" fill="url(#glowB)"/>
  <rect width="960" height="540" fill="url(#grid)" opacity=".72"/>
  <path d="M0 432C140 390 226 404 341 438c138 42 251 43 375-11 87-38 157-50 244-33v146H0Z" fill="#020814" opacity=".42"/>
  <g filter="url(#shadow)">
    <rect x="112" y="92" width="736" height="344" rx="36" fill="#0d1c33" stroke="#ffffff" stroke-opacity=".14"/>
    <rect x="132" y="112" width="696" height="304" rx="28" fill="#09172b" stroke="#ff8a24" stroke-opacity=".40" stroke-width="3"/>
    <g transform="translate(196 166)">
      <rect x="0" y="0" width="244" height="160" rx="34" fill="#152b4b" stroke="#38ddff" stroke-width="10"/>
      <circle cx="78" cy="80" r="31" fill="none" stroke="#91ff37" stroke-width="12"/>
      <path d="M78 34v92M32 80h92" stroke="#91ff37" stroke-width="12" stroke-linecap="round"/>
      <circle cx="176" cy="58" r="15" fill="#ff8a24"/>
      <circle cx="205" cy="91" r="15" fill="#ffc35d"/>
    </g>
    <g transform="translate(492 170)">
      <text x="0" y="42" fill="#ffffff" font-family="Arial Black, Impact, Arial, Helvetica, sans-serif" font-size="44" font-weight="900" letter-spacing="-1.5">READY</text>
      <text x="0" y="92" fill="#91ff37" font-family="Arial Black, Impact, Arial, Helvetica, sans-serif" font-size="48" font-weight="900" letter-spacing="-1.5">TO PLAY</text>
      <rect x="2" y="118" width="224" height="10" rx="5" fill="#ff8a24"/>
      <rect x="2" y="142" width="160" height="10" rx="5" fill="#38ddff" opacity=".74"/>
    </g>
    <text x="480" y="374" text-anchor="middle" fill="#ffbe62" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800" letter-spacing="2">FREE MULTIPLAYER PICK</text>
  </g>
</svg>
